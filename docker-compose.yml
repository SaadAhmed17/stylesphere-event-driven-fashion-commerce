version: "3.9"

services:
  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 3s
      timeout: 5s
      retries: 10

  auth-service:
    build: ./services/auth-service
    environment:
      PORT: 4003
      DATABASE_URL: postgres://auth_user:auth_pass@auth-db:5432/auth_db
      JWT_SECRET: dev-secret-change-me-later
    ports:
      - "4003:4003"
    depends_on:
      auth-db:
        condition: service_healthy

  catalog-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_pass
      POSTGRES_DB: catalog_db
    ports:
      - "5434:5432"
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user -d catalog_db"]
      interval: 3s
      timeout: 5s
      retries: 10

  catalog-service:
    build: ./services/catalog-service
    environment:
      PORT: 4004
      DATABASE_URL: postgres://catalog_user:catalog_pass@catalog-db:5432/catalog_db
      JWT_SECRET: dev-secret-change-me-later
    ports:
      - "4004:4004"
    depends_on:
      catalog-db:
        condition: service_healthy

  inventory-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_pass
      POSTGRES_DB: inventory_db
    ports:
      - "5435:5432"
    volumes:
      - inventory_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory_db"]
      interval: 3s
      timeout: 5s
      retries: 10

  inventory-service:
    build: ./services/inventory-service
    environment:
      PORT: 4005
      DATABASE_URL: postgres://inventory_user:inventory_pass@inventory-db:5432/inventory_db
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq
      JWT_SECRET: dev-secret-change-me-later
    ports:
      - "4005:4005"
    depends_on:
      inventory-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  order-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_pass
      POSTGRES_DB: order_db
    ports:
      - "5436:5432"
    volumes:
      - order_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d order_db"]
      interval: 3s
      timeout: 5s
      retries: 10

  order-service:
    build: ./services/order-service
    environment:
      PORT: 4006
      DATABASE_URL: postgres://order_user:order_pass@order-db:5432/order_db
    ports:
      - "4006:4006"
    depends_on:
      order-db:
        condition: service_healthy      

volumes:
  auth_db_data:
  catalog_db_data:
  inventory_db_data:
  order_db_data: