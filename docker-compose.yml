version: "3.9"

services:
  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 3s
      timeout: 5s
      retries: 10

  auth-service:
    build: ./services/auth-service
    environment:
      PORT: 4003
      DATABASE_URL: postgres://auth_user:auth_pass@auth-db:5432/auth_db
      JWT_SECRET: dev-secret-change-me-later
    ports:
      - "4003:4003"
    depends_on:
      auth-db:
        condition: service_healthy

  catalog-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_pass
      POSTGRES_DB: catalog_db
    ports:
      - "5434:5432"
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user -d catalog_db"]
      interval: 3s
      timeout: 5s
      retries: 10

  catalog-service:
    build: ./services/catalog-service
    environment:
      PORT: 4004
      DATABASE_URL: postgres://catalog_user:catalog_pass@catalog-db:5432/catalog_db
      JWT_SECRET: dev-secret-change-me-later
    ports:
      - "4004:4004"
    depends_on:
      catalog-db:
        condition: service_healthy

volumes:
  auth_db_data:
  catalog_db_data: